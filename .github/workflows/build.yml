name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Unzip project
        run: |
          unzip -q CarBarcode.zip
          ls CarBarcode

      - name: Build APK
        working-directory: CarBarcode
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CarBarcode-v1.0.0
          path: CarBarcode/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: ကားဘားကုဒ် v1.0.0
          body: |
            🚗 ကားဘားကုဒ် v1.0.0
            ✅ PDF417 Barcode generate
            ✅ ကားနံပတ် + ချက်စီနံပတ် + လိုင်စင်ကုန်ဆုံးရက်
            ✅ Image သိမ်းခြင်း + မျှဝေခြင်း
          files: CarBarcode/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

